<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="jakarta.faces.html">
<ui:composition template="/templates/template.xhtml">
    <ui:define name="title">Lista de Tareas</ui:define>
    <ui:define name="contenido">
        <h:form>
            <p:panel header="📋 Listado de Tareas" styleClass="card">
                <p:dataTable value="#{tareaBean.listaTareas}" var="t" 
                             paginator="true" rows="5" 
                             emptyMessage="No hay tareas registradas">
                    <p:column headerText="ID">
                        #{t.id}
                    </p:column>
                    <p:column headerText="Descripción">
                        #{t.descripcion}
                    </p:column>
                    <p:column headerText="Estado">
                        #{t.estado}
                    </p:column>
                    <p:column headerText="Acciones">
                        <p:commandButton value="Eliminar" icon="pi pi-trash" 
                                         action="#{tareaBean.eliminarTarea(t)}"
                                         update="@form" />
                    </p:column>
                </p:dataTable>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
</html>
