<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Registro de usuario</title>
</h:head>
<h:body>
    <h1>Registro de usuario</h1>
    <h:form>
        <div>
            <h:outputLabel for="id" value="ID numérico:" />
            <h:inputText id="id" value="#{usuarioController.nuevoId}" required="true" />
        </div>
        <div>
            <h:outputLabel for="nombre" value="Nombre:" />
            <h:inputText id="nombre" value="#{usuarioController.nuevoNombre}" required="true" />
        </div>
        <div>
        
        <!-- La funcion queda para modificar para que haga la call a la bd  -->
            <h:commandButton value="Agregar usuario" action="#{usuarioController.agregarNuevoUsuario}" />
            
            
            
            <!-- Sigue sin funcionar -->
            <p:button value="Ir a otra página" outcome="CDT.xhtml" />
        </div>
    </h:form>
    <!-- Aquí puedes agregar un <h:messages /> para ver los mensajes de éxito/error -->
    <h:messages />
</h:body>
</html>
