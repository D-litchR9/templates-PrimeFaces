<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>PrimeFaces Demo</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</h:head>

<h:body>
	
    <!-- DOCK -->
    <p:dock position="bottom">
        <p:menuitem value="Home" icon="pi pi-home" url="#"/>
        <p:menuitem value="Search" icon="pi pi-search" url="#"/>
        <p:menuitem value="Settings" icon="pi pi-cog" url="#"/>
        <p:menuitem value="Mail" icon="pi pi-envelope" url="#"/>
        <p:menuitem value="User" icon="pi pi-user" url="#"/>
    </p:dock>

    <div class="wrapper">

        <h:form id="form">

            <!-- HEADER + CLOCK -->
            <div class="glass-panel">
                <div class="header-bar">
                    <h1>PrimeFaces Showcase</h1>
                    <p:clock pattern="HH:mm:ss" mode="server"/>
                </div>
            </div>

            <!-- STATIC MESSAGE -->
            <div class="glass-panel">
                <p:staticMessage severity="info" summary="Bienvenido" 
                                 detail="Demostración de componentes PrimeFaces con CSS personalizado." 
                                 style="width: 100%"/>
            </div>

            <!-- STEPS -->
            <h:panelGroup id="stepsPanel" layout="block">
                <div class="glass-panel">
                    <h3 style="margin-top:0;color:#333;">Progreso de Registro</h3>
                    <p:steps activeIndex="#{demoView.activeStep}">
                        <p:menuitem value="Personal"/>
                        <p:menuitem value="Cuenta"/>
                        <p:menuitem value="Confirmación"/>
                        <p:menuitem value="Finalizar"/>
                    </p:steps>
                    <div style="margin-top:15px;text-align:center;">
                        <p:commandButton value="Siguiente" 
                                         action="#{demoView.setActiveStep(demoView.activeStep + 1)}"
                                         update=":form:stepsPanel" 
                                         disabled="#{demoView.activeStep >= 3}"/>
                    </div>
                </div>
            </h:panelGroup>

            <!-- CAROUSEL -->
            <div class="glass-panel">
                <h3 style="margin-top:0;color:#333;">Tecnologías Destacadas</h3>
                <p:carousel value="#{['Java','Jakarta EE','PrimeFaces','MicroProfile','Docker','Kubernetes']}" 
                            var="tech" numVisible="3" numScroll="1" circular="true" autoplayInterval="3000">
                    <div class="product-item">
                        <p:avatar icon="pi pi-bolt" size="xlarge" 
                                  style="background:#667eea;color:#fff;"/>
                        <h4>#{tech}</h4>
                        <span>Stack moderno</span>
                    </div>
                </p:carousel>
            </div>

            <!-- SPOTLIGHT -->
            <div class="glass-panel">
                <h3 style="margin-top:0;color:#333;">Spotlight</h3>
                <p:commandButton value="Resaltar Panel" 
                                 action="#{demoView.activateSpotlight}" 
                                 update=":form:spotlightBox" 
                                 styleClass="ui-button-warning"/>
                
                <p:spotlight target=":form:spotlightBox" widgetVar="spotlight"/>
                
                <h:panelGroup id="spotlightBox" layout="block" style="margin-top:20px;">
                    <div class="spotlight-box">
                        <h2>¡Atención aquí!</h2>
                        <p>Este panel se resalta con Spotlight.</p>
                        <p:commandButton value="Cerrar Resaltado" 
                                         action="#{demoView.hideSpotlight}" 
                                         oncomplete="PF('spotlight').hide()" 
                                         update=":form:spotlightBox"
                                         rendered="#{demoView.spotlightActive}"/>
                    </div>
                </h:panelGroup>
            </div>

            <!-- DIALOGS -->
            <div class="glass-panel">
                <h3 style="margin-top:0;color:#333;">Diálogos</h3>
                
                <p:commandButton value="Abrir Diálogo Básico" 
                                 type="button" 
                                 onclick="PF('dlgBasic').show()" 
                                 styleClass="ui-button-success" 
                                 style="margin-right:10px;"/>
                
                <p:commandButton value="Abrir Dialog Framework" 
                                 action="#{demoView.openFrameworkDialog}" 
                                 styleClass="ui-button-info"/>
                
                <p:dialog header="Diálogo Básico" widgetVar="dlgBasic" modal="true" 
                          width="500" showEffect="fade" hideEffect="fade">
                    <p>Diálogo estándar de PrimeFaces.</p>
                    <f:facet name="footer">
                        <p:commandButton value="Cerrar" type="button" 
                                         onclick="PF('dlgBasic').hide()" 
                                         styleClass="ui-button-secondary"/>
                    </f:facet>
                </p:dialog>
            </div>

        </h:form>

    </div>

</h:body>
</html>
