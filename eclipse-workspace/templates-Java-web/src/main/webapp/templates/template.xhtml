<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Gestión de Tareas - <ui:insert name="title">Aplicación</ui:insert></title>
    <h:outputStylesheet library="css" name="estilos.css" />
</h:head>
<h:body>
    <div class="layout-wrapper">
        <!-- Encabezado -->
        <div class="layout-header">
            <div class="header-left">
                <h1>Sistema de Gestión de Tareas</h1>
            </div>
            <div class="header-right">
                <p:button value="Cerrar Sesión" icon="pi pi-sign-out" outcome="/index.xhtml" />
            </div>
        </div>

        <!-- Menú de navegación -->
        <h:form>
        <div class="layout-menu">
            <p:menu>
                <p:submenu label="Navegación">
                    <p:menuitem value="Inicio" outcome="/index" icon="pi pi-home"/>
                    <p:menuitem value="Lista de Tareas" outcome="/tareas/lista" icon="pi pi-list"/>
                    <p:menuitem value="Nueva Tarea" outcome="/tareas/nueva" icon="pi pi-plus"/>
                    <p:menuitem value="Acerca de" outcome="/acerca" icon="pi pi-info-circle"/>
                </p:submenu>
            </p:menu>
        </div>
		</h:form>
		
        <!-- Contenido dinámico -->
        <div class="layout-content">
            <ui:insert name="contenido">
                <p:outputLabel value="Contenido por defecto"/>
            </ui:insert>
        </div>

        <!-- Pie de página -->
        <div class="layout-footer">
            <p:outputLabel value="© 2025 - Gestión de Tareas con JSF 4.0 y PrimeFaces"/>
        </div>
    </div>
</h:body>
</html>
