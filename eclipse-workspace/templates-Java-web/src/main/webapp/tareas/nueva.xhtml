<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<ui:composition template="/templates/template.xhtml">
    <ui:define name="title">Nueva Tarea</ui:define>
    <ui:define name="contenido">
        <h:form id="formNuevaTarea">
            <p:panel header="➕ Crear Nueva Tarea" styleClass="card">
                <p:messages showDetail="true" autoUpdate="true" closable="true"/>

                <div style="margin-bottom: 20px;">
                    <p:outputLabel for="descripcion" value="Descripción:" />
                    <p:inputText id="descripcion" 
                                 value="#{tareaBean.nuevaTarea.descripcion}" 
                                 required="true" 
                                 requiredMessage="La descripción es obligatoria"
                                 style="width:100%; margin-top:5px;"/>
                </div>

                <div style="margin-bottom: 25px;">
                    <p:outputLabel for="estado" value="Estado:" />
                    <p:selectOneMenu id="estado" 
                                     value="#{tareaBean.nuevaTarea.estado}" 
                                     required="true"
                                     requiredMessage="Debe seleccionar un estado"
                                     style="width:100%; margin-top:5px;">
                        <f:selectItem itemLabel="Seleccione..." itemValue="" noSelectionOption="true"/>
                        <f:selectItem itemLabel="Pendiente" itemValue="Pendiente"/>
                        <f:selectItem itemLabel="En Progreso" itemValue="En Progreso"/>
                        <f:selectItem itemLabel="Completada" itemValue="Completada"/>
                    </p:selectOneMenu>
                </div>

                <p:commandButton value="Guardar Tarea" 
                                 icon="pi pi-save" 
                                 action="#{tareaBean.agregarTarea()}"
                                 update="@form" 
                                 style="margin-top: 10px;"/>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
</html>
